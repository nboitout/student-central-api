from fastapi import FastAPI
from fastapi.middleware.cors import CORSMiddleware
from dotenv import load_dotenv
import os

from routers import upload, courses, mcq

# Load .env for local development (ignored in production — use Container App env vars)
load_dotenv()

app = FastAPI(
    title="Student Central API",
    description="Backend API for Student Central — reasoning-aware assessment platform",
    version="1.0.0",
)

# ── CORS ─────────────────────────────────────────────────────────────────────
allowed_origins_raw = os.getenv(
    "ALLOWED_ORIGINS",
    "http://localhost:3000"
)
allowed_origins = [o.strip() for o in allowed_origins_raw.split(",")]

app.add_middleware(
    CORSMiddleware,
    allow_origins=allowed_origins,
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
)

# ── Routers ───────────────────────────────────────────────────────────────────
app.include_router(upload.router)
app.include_router(courses.router)
app.include_router(mcq.router)


# ── Health check ──────────────────────────────────────────────────────────────
@app.get("/health", tags=["health"])
async def health_check():
    """
    Liveness probe — confirms the API is running.
    Azure Container Apps calls this to verify the container is healthy.
    """
    return {
        "status": "ok",
        "service": "student-central-api",
        "version": "1.0.0",
    }


@app.get("/", tags=["health"])
async def root():
    return {
        "message": "Student Central API is running.",
        "docs": "/docs",
        "health": "/health",
    }
